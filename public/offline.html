<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Clean Architecture Web App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .container {
      max-width: 480px;
      padding: 40px 30px;
      background-color: #1e293b;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border: 1px solid #334155;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      color: #38bdf8;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.025em;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    button {
      background-color: #0284c7;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #0369a1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>You're Offline</h1>
    <p>It looks like you lost your internet connection. Don't worry, once you're back online, the app will automatically synchronize your workspace.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
