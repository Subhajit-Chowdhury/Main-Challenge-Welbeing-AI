<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Outer Ring -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="none" stroke="#334155" stroke-width="8" />
  <!-- Clean Architecture Inner Icon -->
  <g transform="translate(128, 128)">
    <!-- Hexagonal Structure representing clean layers -->
    <polygon points="128,32 224,88 224,200 128,256 32,200 32,88" fill="none" stroke="url(#grad1)" stroke-width="16" stroke-linejoin="round" />
    <!-- Core concentric circle -->
    <circle cx="128" cy="144" r="48" fill="none" stroke="#f8fafc" stroke-width="12" />
    <circle cx="128" cy="144" r="16" fill="#f8fafc" />
  </g>
</svg>
